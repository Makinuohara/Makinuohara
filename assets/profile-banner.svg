<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">Cozy student developer desk</title>
  <desc id="desc">An original sakura-colored night study desk with a laptop, digital clock, notebooks, network sketches, and a sleeping cat.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9edf1"/>
      <stop offset="0.55" stop-color="#e9d8e3"/>
      <stop offset="1" stop-color="#a7b8cd"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ba8791"/>
      <stop offset="1" stop-color="#765f70"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#363543"/>
      <stop offset="1" stop-color="#1f2430"/>
    </linearGradient>
    <radialGradient id="lampGlow">
      <stop offset="0" stop-color="#ffe7bb" stop-opacity=".9"/>
      <stop offset=".55" stop-color="#f8c9b8" stop-opacity=".35"/>
      <stop offset="1" stop-color="#f8c9b8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#413846" flood-opacity=".2"/>
    </filter>
    <pattern id="stars" width="90" height="70" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="14" r="2" fill="#fff" opacity=".55"/>
      <circle cx="70" cy="38" r="1.4" fill="#fff" opacity=".4"/>
    </pattern>
  </defs>

  <rect width="1600" height="500" rx="28" fill="url(#sky)"/>
  <rect width="1600" height="500" rx="28" fill="url(#stars)" opacity=".55"/>

  <circle cx="1285" cy="160" r="210" fill="url(#lampGlow)" filter="url(#soft)"/>
  <path d="M0 370 C260 340 430 395 690 360 C940 326 1210 354 1600 314 L1600 500 L0 500Z" fill="#f8f0ed" opacity=".55"/>

  <g opacity=".45" stroke="#8d8091" stroke-width="4" fill="none">
    <path d="M105 120h140l48 50h155"/>
    <circle cx="105" cy="120" r="10" fill="#f7d1da"/>
    <circle cx="293" cy="170" r="10" fill="#f7d1da"/>
    <circle cx="448" cy="170" r="10" fill="#f7d1da"/>
    <path d="M190 235h115l55-55"/>
    <circle cx="190" cy="235" r="8" fill="#c4d4e3"/>
    <circle cx="305" cy="235" r="8" fill="#c4d4e3"/>
    <circle cx="360" cy="180" r="8" fill="#c4d4e3"/>
  </g>

  <g opacity=".35" fill="#6e6274">
    <rect x="460" y="106" width="210" height="10" rx="5"/>
    <rect x="460" y="134" width="150" height="10" rx="5"/>
    <rect x="460" y="162" width="184" height="10" rx="5"/>
  </g>

  <rect x="0" y="392" width="1600" height="108" fill="url(#desk)"/>
  <path d="M0 392h1600" stroke="#f4ccd3" stroke-width="8" opacity=".5"/>

  <g transform="translate(1170 58)" filter="url(#shadow)">
    <path d="M86 16h70l22 70H65z" fill="#f4c9bb"/>
    <path d="M120 84v222" stroke="#6c5967" stroke-width="15" stroke-linecap="round"/>
    <path d="M72 308h100" stroke="#6c5967" stroke-width="18" stroke-linecap="round"/>
    <circle cx="120" cy="105" r="92" fill="url(#lampGlow)" opacity=".65"/>
  </g>

  <g transform="translate(735 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="450" height="275" rx="18" fill="#5f5664"/>
    <rect x="18" y="18" width="414" height="228" rx="10" fill="url(#screen)"/>
    <circle cx="225" cy="10" r="4" fill="#d7c7d0"/>
    <g fill="none" stroke-linecap="round" stroke-width="9">
      <path d="M62 70h96" stroke="#e18aa4"/>
      <path d="M92 104h170" stroke="#8eaac4"/>
      <path d="M92 138h118" stroke="#e9bd82"/>
      <path d="M62 172h220" stroke="#b99bc8"/>
      <path d="M92 206h145" stroke="#86b4ad"/>
      <path d="M302 72l28 28-28 28" stroke="#d6a2b2"/>
      <path d="M367 128l-28 28 28 28" stroke="#90a9c4"/>
    </g>
    <path d="M-45 275h540l-56 48H12z" fill="#d8c7cf"/>
    <path d="M165 289h120l18 18H147z" fill="#b6a4af"/>
  </g>

  <g transform="translate(1210 300)" filter="url(#shadow)">
    <rect width="190" height="92" rx="18" fill="#3d3844"/>
    <text x="95" y="62" text-anchor="middle" fill="#f4b9c7" font-size="48" font-family="Consolas, monospace" letter-spacing="5">23:17</text>
  </g>

  <g transform="translate(520 332) rotate(-4)" filter="url(#shadow)">
    <rect width="180" height="88" rx="10" fill="#f6e6df"/>
    <path d="M24 28h112M24 48h135M24 68h92" stroke="#ad8c99" stroke-width="5" stroke-linecap="round" opacity=".6"/>
    <rect x="12" y="-9" width="156" height="18" rx="9" fill="#8fa7bf"/>
  </g>

  <g transform="translate(1400 352)" filter="url(#shadow)">
    <ellipse cx="85" cy="58" rx="105" ry="51" fill="#39343c"/>
    <circle cx="25" cy="34" r="42" fill="#47414a"/>
    <path d="M-2 3l12-34 23 29M43 1l24-30 4 42" fill="#47414a"/>
    <path d="M12 36q13 12 26 0" stroke="#d99caf" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M77 50q65-48 105 0q-38 25-105 0z" fill="#514a53"/>
    <path d="M164 41q42-7 35 26" stroke="#39343c" stroke-width="18" fill="none" stroke-linecap="round"/>
  </g>

  <g fill="#fff" opacity=".6">
    <circle cx="710" cy="84" r="5"/>
    <circle cx="1382" cy="88" r="4"/>
    <circle cx="1490" cy="178" r="6"/>
    <circle cx="985" cy="78" r="3"/>
  </g>

  <path d="M0 0h1600v500H0z" fill="none" stroke="#fff" stroke-opacity=".45" stroke-width="4" rx="28"/>
</svg>
