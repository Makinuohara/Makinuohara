name: Generate contribution snake

on:
  schedule:
    - cron: "20 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out profile source
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Makinuohara
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Generate pink profile cards
        shell: bash
        run: |
          curl --fail --silent --show-error --location \
            "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=Makinuohara&theme=transparent" \
            --output dist/profile-stats.svg
          curl --fail --silent --show-error --location \
            "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=Makinuohara&theme=transparent" \
            --output dist/language-stats.svg

          bash .github/scripts/style-profile-cards.sh \
            dist/profile-stats.svg \
            dist/language-stats.svg

      - name: Publish generated SVGs
        uses: crazy-max/ghaction-github-pages@v4
        with:
          build_dir: dist
          target_branch: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
